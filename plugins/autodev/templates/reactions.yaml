# .workflow/reactions.yaml — Workflow Configuration
# Config file cho autodev orchestrator. Nằm trong .gitignore.

# === Reactions ===
reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 2

# === Agents ===
agents:
  default: claude
  role_mapping:
    spec-writer: default
    spec-reviewer: claude-haiku
    implementer: default
    code-reviewer: default
    reflect: claude-haiku

# === Cross-Model Review (v2.1) ===
cross_model:
  enabled: true
  enforce: false                      # true = bat buoc cross-model, false = best-effort

  role_mapping:
    writer: "claude-opus-4"
    reviewer: "gpt-5.4"
    escalation: "gemini-2.5-pro"

  review_pairs:                       # OPTIONAL — khi thieu, dung role_mapping / auto-pairing
    spec_review:
      writer: "claude-opus-4"
      reviewer: "gpt-5.4"
    plan_review:
      writer: "claude-opus-4"
      reviewer: "gpt-5.4"
    code_review:
      writer: "claude-opus-4"
      reviewer: "claude-sonnet-4"

  escalation:
    enabled: true
    model: "gemini-2.5-pro"
    trigger:
      type: "disagreement"            # "disagreement" | "complexity" | "always" | "never"
      phases: ["code_review"]         # Mac dinh chi code_review
      complexity_threshold: 3         # So files thay doi de coi la "phuc tap"
    phase_config:
      spec_review: false
      plan_review: false
      code_review: true

  consensus:                          # OPTIONAL — khi thieu, consensus DISABLED
    enabled: false
    min_approvals: 2
    strategy: "reviewer_wins"
    on_disagreement: "escalate"       # "escalate" | "reject" | "majority"

  # === Dispatch Config (v2.1 Task 02) ===
  dispatch:
    mode: "auto"                      # "auto" | "agent_only" | "api_only"
    api_timeout_sec: 120              # Timeout cho API call (giay)
    api_max_retries: 1                # Max retries cho 5xx errors
    temp_dir: ".workflow/tmp"         # Thu muc cho temp files
    cleanup_temp: true                # Xoa temp files sau khi doc

# === Budget Capping (v2.1) ===
budget:
  task_budget_tokens: 50000           # Max tokens per task (null = unlimited)
  workflow_budget_tokens: 200000      # Max tokens per workflow (null = unlimited)
  warn_at_pct: 80                     # Warn at N% of limit
  chars_per_token: 4                  # Heuristic (giam 2-3 cho tieng Viet)
  # pricing: (USD per 1M tokens) — optional, enables cost estimates in summary
  #   claude-opus-4:
  #     prompt: 15.00
  #     completion: 75.00
  #   claude-sonnet-4:
  #     prompt: 3.00
  #     completion: 15.00
  #   gpt-5.4:
  #     prompt: 2.50
  #     completion: 10.00
  #   gemini-2.5-pro:
  #     prompt: 1.25
  #     completion: 10.00

# === Cache (v2.1) ===
cache:
  enabled: true                       # master switch — false = disable toan bo cache
  ttl_days: 7                         # thoi gian song cache entry (>= 1)
  max_entries: 100                    # toi da entries (LRU eviction khi vuot, >= 10)
  auto_invalidate_on_git: true        # tu dong invalidate khi git diff thay doi
  normalize_aggressive: false         # luon false — word sort da loai bo
  log_cache_events: true              # log chi tiet cache hit/miss/invalidate
  eviction_pct: 20                    # % entries cu nhat bi xoa khi LRU (10-50)
  relevant_paths_strategy: "auto"     # "auto" | "manual" | "none"

  # Cache reactions
  cache-hit:
    auto: true
    action: log
  cache-invalidated:
    auto: true
    action: log

# === OAuth Config (v2.1) ===
oauth:
  openai:
    default_account: "default"           # Ten account mac dinh cho cross-model dispatch
    allow_api_key_fallback: true          # Cho phep fallback ve OPENAI_API_KEY
    auto_refresh: true                    # Tu dong refresh truoc khi dispatch
