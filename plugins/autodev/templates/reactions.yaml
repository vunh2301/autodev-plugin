# =============================================================================
# .workflow/reactions.yaml — Autodev Configuration
# =============================================================================
# This file configures the autodev workflow orchestrator.
# Located in .workflow/ (gitignored). Created by: /autodev init
# =============================================================================

# --- Project Settings ---
project:
  name: "my-project"              # Project name (used in logs, emails, PR titles)
  language: "en"                  # Output language: "en", "vi", "ja", "zh", etc.
  specs_dir: "docs/specs"         # Where design specs are saved
  plans_dir: "docs/plans"         # Where implementation plans are saved
  test_command: "npm test"        # Command to run tests after implementation

# --- Notifications (optional) ---
notifications:
  email: null                     # Set email address to receive notifications (null = disabled)

# --- Budget (optional) ---
# Controls token usage limits. Remove section for unlimited.
budget:
  task_budget_tokens: 50000       # Max tokens per task (null = unlimited)
  workflow_budget_tokens: 200000  # Max tokens per workflow (null = unlimited)
  warn_at_pct: 80                 # Warn when usage reaches N% of limit

# --- Cache (optional) ---
# Caches specs and plans to skip redundant work on retry/resume.
cache:
  enabled: true
  ttl_days: 7                     # Cache entry lifetime
  max_entries: 100                # Max cache entries (LRU eviction)

# --- OAuth (for Codex mode) ---
# Manages OpenAI authentication for autodev-codex.
# Login: autodev-codex auth login
oauth:
  openai:
    default_account: "default"
    allow_api_key_fallback: true
    auto_refresh: true
